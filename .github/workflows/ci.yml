---
name: CI
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: main
  release:
    types: [released]

jobs:
  ci:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Poetry
        run: |
          pipx install poetry
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: poetry
          cache-dependency-path: poetry.lock

      - name: Poetry lock
        run: |
          poetry lock

      - name: Install dependencies
        run: |
          poetry install

      - name: Codegen
        run: |
          make codegen

      - name: Format
        run: |
          make format

      - name: Typecheck
        run: |
          poetry run pyright .

      - name: Lint
        run: |
          poetry run ruff check .

      # No secrets and no integration-gated live tests, so it works on forks.
      - name: Test
        run: |
          poetry run pytest tests/ --with-slow

      - name: Build sdist
        run: |
          poetry build -f sdist

      - name: Check docs
        run: |
          make doc-check

      - name: Check For changes
        id: changes
        run: |
          git diff --exit-code

  integration:
    # Live API tests need repo secrets, which forks don't have. Run them on
    # pushes to main and manual dispatch only; pull request CI stays hermetic.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Poetry
        run: |
          pipx install poetry
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: poetry
          cache-dependency-path: poetry.lock

      - name: Poetry lock
        run: |
          poetry lock

      - name: Install dependencies
        run: |
          poetry install

      - name: Test (integration)
        env:
          E2E_GNOSIS_MAINNET_TESTING_EOA_PRIVATE_KEY: ${{ secrets.E2E_GNOSIS_MAINNET_TESTING_EOA_PRIVATE_KEY }}
        run: |
          poetry run pytest tests/ --with-slow --integration
